[project]
name = "cove"
version = "0.1.0"
description = "A simple API for managing a collection of configuration items and files."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.18.4",
    "fastapi[standard]>=0.129.2",
    "sqlmodel>=0.0.37",
]


[tool.setuptools.packages.find]
where = ["src"]
