info:
  name: Login For Access Token
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/users/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: ""
        disabled: true
      - name: username
        value: lyubolp
      - name: password
        value: "1234"
      - name: scope
        value: ""
        disabled: true
      - name: client_id
        value: ""
        disabled: true
      - name: client_secret
        value: ""
        disabled: true
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: 127.0.0.1:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/users/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "token_type": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/users/token"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
