info:
  name: Get All Key Values
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/key_value/:project_id"
  params:
    - name: project_id
      value: 0e1d0498-f384-4f5b-8995-83ec8d67dcaa
      type: path
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /users/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

runtime:
  variables:
    - name: baseUrl
      value: http://127.0.0.1:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/key_value/:project_id"
      method: GET
      params:
        - name: project_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/key_value/:project_id"
      method: GET
      params:
        - name: project_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
