info:
  name: Test User Logged In
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/users/test"
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: http://127.0.0.1:8000/users/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: id
      clientSecret: secret
      placement: header
    resourceOwner:
      username: lyubo2
      password: "1234"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true

runtime:
  variables:
    - name: baseUrl
      value: http://127.0.0.1:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/users/test"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""
