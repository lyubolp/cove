info:
  name: Create User
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/users/?username=lyubo2&password=1234"
  params:
    - name: username
      value: lyubo2
      type: query
    - name: password
      value: "1234"
      type: query
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: 127.0.0.1:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/users/"
      method: POST
      params:
        - name: username
          value: ""
          type: query
        - name: password
          value: ""
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "username": "",
            "password_hash": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/users/"
      method: POST
      params:
        - name: username
          value: ""
          type: query
        - name: password
          value: ""
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
