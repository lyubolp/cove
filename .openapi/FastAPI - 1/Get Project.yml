info:
  name: Get Project
  type: http
  seq: 18

http:
  method: GET
  url: "{{baseUrl}}/project/:project_id"
  params:
    - name: project_id
      value: "1234"
      type: path
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://127.0.0.1:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/project/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": "",
              "is_public": false
            }
          ]
