  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/key_value/:project_id/:key?value=world"
  params:
    - name: value
      value: world
      type: query
    - name: is_public
      value: ""
      type: query
      disabled: true
    - name: project_id
      value: 02bb8584-0684-407c-a1f6-c1ebcc123dce
